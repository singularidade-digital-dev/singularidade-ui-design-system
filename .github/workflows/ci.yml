name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9.15.0 }
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm format:check

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9.15.0 }
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9.15.0 }
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      # tokens tests assert against build output (build/css/*.css, build/json/*, build/java/*).
      # Style Dictionary doesn't run as a vitest fixture, so emit it explicitly.
      - run: pnpm --filter @singularidade/tokens build
      - run: pnpm --filter @singularidade/brand-assets build
      - run: pnpm test

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9.15.0 }
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  java-build:
    name: Java Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9.15.0 }
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - uses: actions/setup-java@v5
        with: { distribution: temurin, java-version: 21, cache: maven }
      - run: pnpm install --frozen-lockfile
      # Style Dictionary outputs (build/css, build/js, build/java) and
      # brand-assets fonts must exist before Maven copies them at process-resources.
      - run: pnpm --filter @singularidade/tokens build
      - run: pnpm --filter @singularidade/brand-assets build
      # Single Maven invocation builds the full reactor so the parent pom is
      # implicitly available to every child. Splitting into separate `mvn -pl`
      # calls breaks transitive parent resolution: each child install records
      # parent: digital.singularidade:singularidade-ui-design-system-parent in
      # its installed pom, and a *later* mvn invocation can't resolve that
      # parent from ~/.m2 because no step ever installs the aggregator alone.
      - run: mvn -pl packages/tokens,packages/brand-assets,packages/vaadin-bindings install -DskipTests -B

  storybook:
    name: Storybook Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9.15.0 }
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      # storybook/preview.ts imports from @singularidade/tokens/css/* — those
      # files are emitted by Style Dictionary into packages/tokens/build/css/,
      # so the tokens build must run before storybook bundles its preview.
      - run: pnpm --filter @singularidade/tokens build
      - run: pnpm --filter @singularidade/brand-assets build
      - run: pnpm --filter @singularidade/storybook build
      - uses: actions/upload-artifact@v4
        with:
          name: storybook-static
          path: apps/storybook/storybook-static
          retention-days: 7

  changeset-check:
    name: Changeset Required
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: pnpm/action-setup@v4
        with: { version: 9.15.0 }
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm changeset status --since=origin/main
        continue-on-error: true
