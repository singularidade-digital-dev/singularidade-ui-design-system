name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
      pull-requests: write
      id-token: write # npm provenance + AWS OIDC
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: pnpm/action-setup@v4
        with: { version: 9.15.0 }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 21, cache: maven }

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}

      - run: pnpm install --frozen-lockfile

      # Build pnpm assets first so vaadin-bindings can copy tokens/brand-assets
      # outputs at Maven process-resources, and so changesets can include
      # generated artifacts in any npm publish.
      - run: pnpm build

      - name: Create Release Pull Request or Publish (npm)
        id: changesets
        uses: changesets/action@v1
        continue-on-error: true # npm scope @singularidade isn't yet provisioned;
        # don't let npm-side failures block the Maven publish that downstream
        # apps depend on. Track npm setup separately.
        with:
          publish: pnpm release
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Maven publish to CodeArtifact runs unconditionally on push to main.
      # Versions stay at *-SNAPSHOT in pom.xml; CodeArtifact stores each push
      # under a timestamped revision. This is what unblocks the Java consumers
      # (singularidade-ui-vaadin, integras-digital, integras-digital-plataform).
      - name: Login to AWS CodeArtifact
        run: aws codeartifact login --tool maven --repository maven --domain singularidade-digital --domain-owner 539191403497

      - name: Maven Deploy (SNAPSHOT)
        run: mvn -pl packages/tokens,packages/brand-assets,packages/vaadin-bindings deploy -DskipTests -B
