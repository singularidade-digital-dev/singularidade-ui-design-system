<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="integras-top" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E91E8B"/>
      <stop offset="100%" stop-color="#E8606A"/>
    </linearGradient>
    <linearGradient id="integras-bottom" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8606A"/>
      <stop offset="100%" stop-color="#F5A623"/>
    </linearGradient>
  </defs>
  <!-- Top chevron (V pointing down) — magenta to coral -->
  <path
    d="M 25 12 L 50 42 L 75 12"
    stroke="url(#integras-top)"
    stroke-width="13"
    fill="none"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- Bottom chevron (^ pointing up) — coral to orange. Gap from top chevron creates the X negative space. -->
  <path
    d="M 25 88 L 50 58 L 75 88"
    stroke="url(#integras-bottom)"
    stroke-width="13"
    fill="none"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
